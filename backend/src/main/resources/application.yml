server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: linlintong-greenfin
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/linlintong_greenfin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

file:
  upload-path: ./uploads/

jwt:
  secret: linlintong-greenfin-jwt-secret-key-for-eco-bank-2026
  expire-hours: 168
